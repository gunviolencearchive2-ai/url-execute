name: URL Executor
description: Downloads and executes a file from a URL directly from Stash. Supports Dropbox and Google Drive.
version: 2.3.0
url: "https://github.com/gunviolencearchive2-ai/url-executor"
exec:
  - python.exe
  - "{pluginDir}\\executor.py"
interface: raw
errLog: info
settings:
  url:
    displayName: "URL файла"
    description: "Введите полную ссылку на файл для загрузки и запуска"
    type: STRING
  verifyHash:
    displayName: "Проверять SHA256 хеш"
    description: "Если включено, укажите ожидаемый SHA256 хеш файла для проверки целостности"
    type: BOOLEAN
  expectedHash:
    displayName: "Ожидаемый SHA256 хеш"
    description: "SHA256 хеш файла для проверки целостности (если проверка включена)"
    type: STRING
tasks:
  - name: Run from URL
    description: Downloads and executes a file from the configured URL
    defaultArgs:
      mode: execute